<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>다드림 — 오프라인</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 1.5rem;
        font-family: system-ui, -apple-system, "Apple SD Gothic Neo", "Pretendard Variable", Pretendard, "Noto Sans KR", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #020617; color: #e2e8f0; }
      }
      h1 { font-size: 1.5rem; margin: 0; }
      p { font-size: 0.95rem; line-height: 1.6; max-width: 28rem; text-align: center; color: #475569; margin: 0; }
      @media (prefers-color-scheme: dark) { p { color: #94a3b8; } }
      button {
        margin-top: 0.5rem;
        padding: 0.65rem 1.1rem;
        border-radius: 0.5rem;
        border: 0;
        background: #0f172a;
        color: white;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
      }
      @media (prefers-color-scheme: dark) { button { background: #e2e8f0; color: #020617; } }
    </style>
  </head>
  <body>
    <h1>오프라인이에요 🌐</h1>
    <p>
      인터넷 연결이 없거나 일시적으로 응답이 없어요.
      잠시 후 다시 시도해주세요.
    </p>
    <button type="button" onclick="location.reload()">다시 시도</button>
  </body>
</html>
